<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XtoMD Clipper Options</title>
  </head>
  <body>
    <main>
      <header>
        <h1>XtoMD Clipper</h1>
        <p>Set your local Obsidian destination for saved clips.</p>
      </header>

      <label>
        Obsidian vault ID
        <input id="vaultId" type="text" spellcheck="false" placeholder="Paste your Obsidian vault ID">
      </label>

      <label>
        Folder
        <input id="folder" type="text" spellcheck="false" placeholder="raw/xthreads">
      </label>

      <button id="save" type="button">Save settings</button>
      <p id="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
